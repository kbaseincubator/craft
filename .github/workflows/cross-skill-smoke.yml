# CRAFT Phase 2 — Cross-Skill Smoke Test
#
# As of v0.1.4 (2026-06-03), narrowed to adversarial-only on a real
# BERIL project. paper-writer + presentation-maker invocations are
# descoped pending upstream skill CI-portability fixes:
#
#   - paper-writer issue:
#     https://github.com/kbaseincubator/beril-paper-writer-skill/issues/1
#     (CI/unattended needs --auto-pick TL1 or equivalent; the draft
#     command halts at the throughline-pick gate by architectural
#     intent — "Never auto-pick; the user picks").
#
#   - presentation-maker issue:
#     https://github.com/kbaseincubator/beril-presentation-maker-skill/issues/1
#     (orchestrator can't discover the pipx-installed Python
#     interpreter on a fresh GitHub Actions runner — works on the
#     hub but not in clean CI).
#
# When both land, restore the full three-skill end-to-end smoke +
# the matching artifact verification + cost summary loop. See
# CRAFT-DEPENDENCIES.md §6 for the watchlist entry.
#
# Current cost: ~$1-2 per run (just adversarial review on a real
# project). Wall-clock: ~10-15 min. Behind manual-trigger +
# quarterly schedule.
#
# Triggers:
#   - Manual via GitHub UI ("Run workflow") — the typical path
#   - Quarterly cron (1st of Mar/Jun/Sep/Dec at 08:00 UTC)
#   - Repository dispatch event (submodule-release-fired)
#
# Requirements:
#   secrets (mask in logs; for sensitive values):
#     - ANTHROPIC_API_KEY: direct Anthropic API auth for `claude -p`
#       invocations on the runner. Different from the CBORG token
#       used in local BERIL deployments — the CI runner has no
#       CBORG-routed claude config, so it needs a direct Anthropic
#       key. Cost goes against your Anthropic account, not CBORG.
#     - CBORG_API_KEY: gateway token written into the fixture .env
#       for skills that route image-gen through CBORG. Still needed
#       because presentation-maker's image_client.py reads
#       CBORG_API_KEY directly from .env for image-gen calls.
#   variables (visible in UI; for non-sensitive config — pinned
#   to keep smoke deterministic across BERIL evolution):
#     - SMOKE_BERIL_REPO: e.g. "kbaseincubator/BERIL-research-observatory"
#     - SMOKE_BERIL_COMMIT: full SHA the smoke pins to (so smoke
#       is reproducible across BERIL repo changes)
#     - SMOKE_BERIL_PROJECT_ID: which project subdirectory to
#       exercise (e.g. "microbeatlas_metal_ecology")
#
# Cost guardrails:
#   - Per-run budget cap of $20 (kill the workflow if exceeded)
#   - 90-minute timeout (kill if hangs)
#
# Maintainer notes:
#   - The smoke fires automatically on the quarterly schedule.
#     If the schedule fires when you don't want it (e.g.,
#     mid-deprecation-window), DISABLE the workflow temporarily
#     via the GitHub UI "Actions" → "Cross-Skill Smoke Test" →
#     "Disable workflow" button.
#   - The manual-trigger path is the recommended use: run it
#     before each platform release tag.

name: Cross-Skill Smoke Test

on:
  workflow_dispatch:
    inputs:
      max_cost_usd:
        description: 'Max LLM cost in USD (kills workflow if exceeded)'
        required: false
        default: '20'
      project_id:
        description: 'BERIL project ID to smoke against (uses fixture if empty)'
        required: false
        default: ''
  schedule:
    # Quarterly: 1st of Mar/Jun/Sep/Dec at 08:00 UTC
    - cron: '0 8 1 3,6,9,12 *'
  repository_dispatch:
    types: [submodule-released]

jobs:
  cross-skill-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CBORG_API_KEY: ${{ secrets.CBORG_API_KEY }}
      GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
      SMOKE_BERIL_REPO: ${{ vars.SMOKE_BERIL_REPO }}
      SMOKE_BERIL_COMMIT: ${{ vars.SMOKE_BERIL_COMMIT }}
      SMOKE_BERIL_PROJECT_ID: ${{ vars.SMOKE_BERIL_PROJECT_ID }}
      MAX_COST_USD: ${{ inputs.max_cost_usd || '20' }}
      PROJECT_ID_OVERRIDE: ${{ inputs.project_id || '' }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node (for Claude CLI)
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Install LibreOffice (for PDF rendering + visual-QA)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice poppler-utils
          soffice --version
          pdftoppm -v 2>&1 | head -1

      - name: Install pipx
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
          # Use the per-step PATH for subsequent installs
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "Pre-flight: verify required config"
        run: |
          MISSING=0
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "❌ ANTHROPIC_API_KEY not set (needed for claude -p on CI runner)"
            echo "   Get one at https://console.anthropic.com/settings/keys"
            echo "   Add at Settings → Secrets and variables → Actions → Secrets"
            MISSING=1
          fi
          if [ -z "$CBORG_API_KEY" ]; then
            echo "❌ CBORG_API_KEY not set (needed for image-gen in presentation-maker)"
            echo "   Add at Settings → Secrets and variables → Actions → Secrets"
            MISSING=1
          fi
          if [ -z "$SMOKE_BERIL_REPO" ]; then
            echo "❌ SMOKE_BERIL_REPO variable not set"
            echo "   Set at Settings → Secrets and variables → Actions → Variables tab"
            echo "   Recommended: kbaseincubator/BERIL-research-observatory"
            MISSING=1
          fi
          if [ -z "$SMOKE_BERIL_COMMIT" ]; then
            echo "❌ SMOKE_BERIL_COMMIT variable not set"
            echo "   Set to a full SHA from the BERIL repo (pins smoke reproducibility)"
            MISSING=1
          fi
          if [ -z "$SMOKE_BERIL_PROJECT_ID" ]; then
            echo "❌ SMOKE_BERIL_PROJECT_ID variable not set"
            echo "   Set to a project subdir name (e.g. microbeatlas_metal_ecology)"
            MISSING=1
          fi
          if [ "$MISSING" -ne 0 ]; then
            echo ""
            echo "See .github/workflows/README.md §3 for the secrets+variables setup walk-through."
            exit 1
          fi
          # workflow_dispatch override takes precedence over the pinned project
          EFFECTIVE_PROJECT="${PROJECT_ID_OVERRIDE:-$SMOKE_BERIL_PROJECT_ID}"
          echo "✓ pre-flight passed"
          echo "  BERIL repo:    $SMOKE_BERIL_REPO"
          echo "  Pinned commit: $SMOKE_BERIL_COMMIT"
          echo "  Project:       $EFFECTIVE_PROJECT"

      - name: Install the three CRAFT skills via pipx
        run: |
          # Reads versions from CRAFT meta-package's pyproject.toml
          # (transitive deps). Equivalent to `pipx install craft` if
          # CRAFT were on PyPI; here we install each skill explicitly
          # to keep the install-step visible in CI logs.
          for skill_repo in \
            "git+https://github.com/kbaseincubator/beril-adversarial-skill.git" \
            "git+https://github.com/kbaseincubator/beril-paper-writer-skill.git" \
            "git+https://github.com/kbaseincubator/beril-presentation-maker-skill.git"
          do
            echo "── pipx install $skill_repo"
            pipx install "$skill_repo"
          done
          beril-adversarial --version
          beril-paper-writer --version
          beril-presentation-maker --version

      - name: Install the CRAFT meta-package
        run: pip install -e . --no-deps

      - name: Verify CRAFT doctor passes
        run: craft doctor || (echo "doctor failed; investigate" && exit 1)

      - name: Set up BERIL fixture (sparse-checkout from upstream)
        run: |
          # Effective project: workflow_dispatch override > pinned variable.
          EFFECTIVE_PROJECT="${PROJECT_ID_OVERRIDE:-$SMOKE_BERIL_PROJECT_ID}"
          echo "EFFECTIVE_PROJECT=$EFFECTIVE_PROJECT" >> $GITHUB_ENV

          mkdir -p /tmp/beril-smoke
          cd /tmp/beril-smoke

          # Sparse-checkout fetches only the named project subdir +
          # .claude/skills/ (for skill-discovery config), not the
          # full 400+ MB BERIL repo. Pinned to a specific commit so
          # smoke is reproducible.
          git init -q
          git remote add origin "https://github.com/${SMOKE_BERIL_REPO}.git"
          git config core.sparseCheckout true
          # Patterns: the project + .claude/skills/ + top-level meta.
          # Write the patterns one per line via printf — heredocs inside
          # YAML `|` blocks preserve YAML indentation as literal
          # whitespace, which sparse-checkout treats as part of the
          # pattern + matches everything (the bug observed in run
          # 26904057672 that pulled in all 100+ projects).
          {
            printf 'projects/%s/*\n' "$EFFECTIVE_PROJECT"
            printf '.claude/skills/\n'
            printf '.env.template\n'
            printf 'README.md\n'
          } > .git/info/sparse-checkout
          echo "── sparse-checkout patterns:"
          cat .git/info/sparse-checkout
          git fetch --depth 1 origin "$SMOKE_BERIL_COMMIT"
          git checkout FETCH_HEAD
          echo ""
          echo "── Fixture layout:"
          ls -la /tmp/beril-smoke/ | head -20
          echo ""
          echo "── Project artifacts:"
          ls -la "/tmp/beril-smoke/projects/${EFFECTIVE_PROJECT}/" | head -15

          # Ensure .env carries the LLM key (sparse-checkout won't pull
          # .env since it's gitignored upstream + we don't want to)
          # Write all three API keys into the fixture's .env so the
          # skills find them. presentation-maker's image_client.py
          # reads CBORG_API_KEY + GOOGLE_AI_STUDIO_API_KEY from .env
          # for image-gen; claude -p picks up ANTHROPIC_API_KEY from
          # the runner env directly (set in the job env block above).
          {
            echo "CBORG_API_KEY=$CBORG_API_KEY"
            if [ -n "$GOOGLE_AI_STUDIO_API_KEY" ]; then
              echo "GOOGLE_AI_STUDIO_API_KEY=$GOOGLE_AI_STUDIO_API_KEY"
            fi
          } > /tmp/beril-smoke/.env
          # Ensure .claude/skills/ exists even if sparse-checkout came up empty
          mkdir -p /tmp/beril-smoke/.claude/skills

      - name: Install CRAFT into the fixture BERIL deployment
        run: craft install-platform /tmp/beril-smoke

      - name: Smoke — adversarial review on the fixture
        run: |
          echo "Using project: $EFFECTIVE_PROJECT"
          cd /tmp/beril-smoke
          # adversarial joins <beril-root>/projects/<arg> internally —
          # pass just the project_id, NOT "projects/<id>"
          beril-adversarial review \
            --type project \
            "$EFFECTIVE_PROJECT" \
            --beril-root /tmp/beril-smoke

      # ────────────────────────────────────────────────────────────────
      # v0.1.4 scope narrowing: paper-writer + presentation-maker
      # invocations descoped pending upstream skill fixes (see CRAFT-
      # DEPENDENCIES.md §6). When the linked skill issues land, restore
      # the full three-skill end-to-end smoke + the matching artifact
      # verification + the cost summary loop.
      #
      #   paper-writer: needs --auto-pick TL1 (or equivalent CI mode)
      #     because `draft` halts at the throughline-pick gate by
      #     design ("Never auto-pick; the user picks" — plan.v1.md).
      #     Issue: https://github.com/kbaseincubator/beril-paper-writer-skill/issues/1
      #
      #   presentation-maker: bash orchestrator can't discover the
      #     pipx-installed Python interpreter on a fresh GH Actions
      #     runner. Works on Adam's hub deployment but not in clean
      #     CI.
      #     Issue: https://github.com/kbaseincubator/beril-presentation-maker-skill/issues/1
      # ────────────────────────────────────────────────────────────────

      - name: Verify artifacts produced
        run: |
          PROJECT_DIR="/tmp/beril-smoke/projects/$EFFECTIVE_PROJECT"
          set -e

          # Adversarial review markdown (--type project writes
          # ADVERSARIAL_REVIEW_N.md to the project root, not a JSON
          # under audit/. The JSON output is for --type paper +
          # --type presentation; project-level review is markdown.)
          ADV_MD=$(find "$PROJECT_DIR" -maxdepth 1 -name "ADVERSARIAL_REVIEW_*.md" 2>/dev/null | head -1 || echo "")
          if [ -z "$ADV_MD" ] || [ ! -s "$ADV_MD" ]; then
            echo "❌ adversarial did not produce ADVERSARIAL_REVIEW_N.md"
            exit 1
          fi
          echo "✓ adversarial review at: $ADV_MD ($(wc -c < "$ADV_MD") bytes)"

          # v0.1.4 narrowed scope: paper-writer + presentation-maker
          # deliverable verification descoped (see above). Re-enable when
          # the linked skill issues land.

      - name: Report cost summary
        if: always()
        run: |
          PROJECT_DIR="/tmp/beril-smoke/projects/${EFFECTIVE_PROJECT:-unknown}"
          echo "═══ Cross-skill smoke cost summary ═══"
          # Each skill writes its own cost log under audit/runs/run-N/.
          # Aggregate the total_cost_usd fields via a one-liner python script.
          for draft in "$PROJECT_DIR"/papers/draft_*/audit/runs/run-*/summary.json \
                       "$PROJECT_DIR"/talks/draft_*/audit/runs/run-*/summary.json; do
            if [ -f "$draft" ]; then
              echo "── $draft"
              python -c "import json,sys; print(f'  total: \${json.load(open(sys.argv[1])).get(\"total_cost_usd\", 0):.2f}')" "$draft" 2>/dev/null || true
            fi
          done

      - name: Upload artifacts (on failure for forensics)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: cross-skill-smoke-failure-${{ github.run_id }}
          # v0.1.4: narrow to just the smoke target project (the
          # sparse-checkout pulls in more than just the named project;
          # uploading the whole projects/ tree inflates the artifact to
          # hundreds of MB for forensics that only need ~10 MB).
          path: /tmp/beril-smoke/projects/${{ vars.SMOKE_BERIL_PROJECT_ID }}/
          retention-days: 14
