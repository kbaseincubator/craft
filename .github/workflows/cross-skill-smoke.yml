# CRAFT Phase 2 — Cross-Skill Smoke Test (full smoke)
#
# Runs the actual end-to-end CRAFT workflow against a real BERIL
# project: adversarial review → paper-writer draft → presentation-
# maker draft → verify all artifacts produced.
#
# Cost: ~$10-15 per run (LLM stages). Wall-clock: ~30-60 min.
# Behind manual-trigger + quarterly schedule to keep cost bounded.
#
# Triggers:
#   - Manual via GitHub UI ("Run workflow") — the typical path
#   - Quarterly cron (1st of Mar/Jun/Sep/Dec at 08:00 UTC)
#   - Repository dispatch event (submodule-release-fired)
#
# Requirements (configured in repo secrets):
#   - CBORG_API_KEY: LLM auth via LBL CBORG gateway
#   - SMOKE_BERIL_FIXTURE_TARBALL_URL: tarball URL of a small BERIL
#     fixture project for smoke testing
#
# Cost guardrails:
#   - Per-run budget cap of $20 (kill the workflow if exceeded)
#   - 90-minute timeout (kill if hangs)
#
# Maintainer notes:
#   - The smoke fires automatically on the quarterly schedule.
#     If the schedule fires when you don't want it (e.g.,
#     mid-deprecation-window), DISABLE the workflow temporarily
#     via the GitHub UI "Actions" → "Cross-Skill Smoke Test" →
#     "Disable workflow" button.
#   - The manual-trigger path is the recommended use: run it
#     before each platform release tag.

name: Cross-Skill Smoke Test

on:
  workflow_dispatch:
    inputs:
      max_cost_usd:
        description: 'Max LLM cost in USD (kills workflow if exceeded)'
        required: false
        default: '20'
      project_id:
        description: 'BERIL project ID to smoke against (uses fixture if empty)'
        required: false
        default: ''
  schedule:
    # Quarterly: 1st of Mar/Jun/Sep/Dec at 08:00 UTC
    - cron: '0 8 1 3,6,9,12 *'
  repository_dispatch:
    types: [submodule-released]

jobs:
  cross-skill-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CBORG_API_KEY: ${{ secrets.CBORG_API_KEY }}
      SMOKE_BERIL_FIXTURE_TARBALL_URL: ${{ secrets.SMOKE_BERIL_FIXTURE_TARBALL_URL }}
      MAX_COST_USD: ${{ inputs.max_cost_usd || '20' }}
      PROJECT_ID: ${{ inputs.project_id || '' }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node (for Claude CLI)
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Install LibreOffice (for PDF rendering + visual-QA)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice poppler-utils
          soffice --version
          pdftoppm -v 2>&1 | head -1

      - name: Install pipx
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
          # Use the per-step PATH for subsequent installs
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "Pre-flight: verify required secrets"
        run: |
          if [ -z "$CBORG_API_KEY" ]; then
            echo "❌ CBORG_API_KEY not set in repo secrets."
            echo "Set it at: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          if [ -z "$SMOKE_BERIL_FIXTURE_TARBALL_URL" ]; then
            echo "⚠️  SMOKE_BERIL_FIXTURE_TARBALL_URL not set."
            echo "Full smoke needs a BERIL fixture project. Either:"
            echo "  (a) Set SMOKE_BERIL_FIXTURE_TARBALL_URL to a tarball URL"
            echo "  (b) Use workflow_dispatch with project_id input"
            exit 1
          fi
          echo "✓ pre-flight passed"

      - name: Install the three CRAFT skills via pipx
        run: |
          # Reads versions from CRAFT meta-package's pyproject.toml
          # (transitive deps). Equivalent to `pipx install craft` if
          # CRAFT were on PyPI; here we install each skill explicitly
          # to keep the install-step visible in CI logs.
          for skill_repo in \
            "git+https://github.com/ArkinLaboratory/beril-adversarial-skill.git" \
            "git+https://github.com/ArkinLaboratory/beril-paper-writer-skill.git" \
            "git+https://github.com/ArkinLaboratory/beril-presentation-maker-skill.git"
          do
            echo "── pipx install $skill_repo"
            pipx install "$skill_repo"
          done
          beril-adversarial --version
          beril-paper-writer --version
          beril-presentation-maker --version

      - name: Install the CRAFT meta-package
        run: pip install -e . --no-deps

      - name: Verify CRAFT doctor passes
        run: craft doctor || (echo "doctor failed; investigate" && exit 1)

      - name: Set up BERIL fixture
        run: |
          mkdir -p /tmp/beril-smoke
          if [ -n "$PROJECT_ID" ]; then
            echo "Using project_id from input: $PROJECT_ID (must be in fixture tarball)"
          fi
          # Download + extract the smoke fixture
          curl -sSL "$SMOKE_BERIL_FIXTURE_TARBALL_URL" -o /tmp/beril-fixture.tar.gz
          tar -xzf /tmp/beril-fixture.tar.gz -C /tmp/beril-smoke
          ls /tmp/beril-smoke/
          # Ensure .env carries the LLM key
          if [ ! -f /tmp/beril-smoke/.env ]; then
            echo "CBORG_API_KEY=$CBORG_API_KEY" > /tmp/beril-smoke/.env
          fi

      - name: Install CRAFT into the fixture BERIL deployment
        run: craft install-platform /tmp/beril-smoke

      - name: Smoke — adversarial review on the fixture
        run: |
          PROJECT_ID="${PROJECT_ID:-$(ls /tmp/beril-smoke/projects | head -1)}"
          echo "Using project: $PROJECT_ID"
          cd /tmp/beril-smoke
          beril-adversarial review \
            --type project \
            "projects/$PROJECT_ID" \
            --beril-root /tmp/beril-smoke

      - name: Smoke — paper-writer draft
        run: |
          PROJECT_ID="${PROJECT_ID:-$(ls /tmp/beril-smoke/projects | head -1)}"
          cd /tmp/beril-smoke
          beril-paper-writer draft "$PROJECT_ID" \
            --auto-advance \
            --no-adversarial \
            --max-revise-cost-usd 5 \
            2>&1 | tail -30

      - name: Smoke — presentation-maker draft
        run: |
          PROJECT_ID="${PROJECT_ID:-$(ls /tmp/beril-smoke/projects | head -1)}"
          cd /tmp/beril-smoke
          beril-presentation-maker draft "$PROJECT_ID" \
            --tier STRONG --mode talk-30 \
            --auto-advance \
            --auto-approve-images \
            --no-adversarial \
            --max-image-cost-usd 0.20 \
            --max-revise-cost-usd 5 \
            2>&1 | tail -30

      - name: Verify artifacts produced
        run: |
          PROJECT_ID="${PROJECT_ID:-$(ls /tmp/beril-smoke/projects | head -1)}"
          PROJECT_DIR="/tmp/beril-smoke/projects/$PROJECT_ID"
          set -e

          # Paper-writer deliverable
          PAPER_DRAFT=$(find "$PROJECT_DIR/papers" -name "*.docx" 2>/dev/null | head -1 || echo "")
          if [ -z "$PAPER_DRAFT" ] || [ ! -s "$PAPER_DRAFT" ]; then
            echo "❌ paper-writer did not produce a non-empty .docx"
            exit 1
          fi
          echo "✓ paper draft at: $PAPER_DRAFT ($(wc -c < "$PAPER_DRAFT") bytes)"

          # Presentation-maker deliverable
          PRES_DRAFT=$(find "$PROJECT_DIR/talks" -name "draft.pptx" 2>/dev/null | head -1 || echo "")
          if [ -z "$PRES_DRAFT" ] || [ ! -s "$PRES_DRAFT" ]; then
            echo "❌ presentation-maker did not produce a non-empty draft.pptx"
            exit 1
          fi
          echo "✓ presentation draft at: $PRES_DRAFT ($(wc -c < "$PRES_DRAFT") bytes)"

          # Adversarial review JSON
          ADV_JSON=$(find "$PROJECT_DIR" -name "adversarial_review.json" 2>/dev/null | head -1 || echo "")
          if [ -z "$ADV_JSON" ] || [ ! -s "$ADV_JSON" ]; then
            echo "❌ adversarial did not produce adversarial_review.json"
            exit 1
          fi
          echo "✓ adversarial review at: $ADV_JSON"

      - name: Report cost summary
        if: always()
        run: |
          PROJECT_ID="${PROJECT_ID:-$(ls /tmp/beril-smoke/projects 2>/dev/null | head -1 || echo unknown)}"
          PROJECT_DIR="/tmp/beril-smoke/projects/$PROJECT_ID"
          echo "═══ Cross-skill smoke cost summary ═══"
          # Each skill writes its own cost log under audit/runs/run-N/.
          # Aggregate the total_cost_usd fields via a one-liner python script.
          for draft in "$PROJECT_DIR"/papers/draft_*/audit/runs/run-*/summary.json \
                       "$PROJECT_DIR"/talks/draft_*/audit/runs/run-*/summary.json; do
            if [ -f "$draft" ]; then
              echo "── $draft"
              python -c "import json,sys; print(f'  total: \${json.load(open(sys.argv[1])).get(\"total_cost_usd\", 0):.2f}')" "$draft" 2>/dev/null || true
            fi
          done

      - name: Upload artifacts (on failure for forensics)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: cross-skill-smoke-failure-${{ github.run_id }}
          path: /tmp/beril-smoke/projects/
          retention-days: 14
